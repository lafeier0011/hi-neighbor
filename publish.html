<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邻趣集市 - 发布页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
  background: #f0f0f0;
  display: flex; flex-direction: column; align-items: center; padding: 20px;
}
.page-label { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 24px; }
.phone-frame {
  width: 375px; height: 812px; background: #fff;
  border-radius: 40px; border: 8px solid #1a1a1a;
  overflow: hidden; position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin-bottom: 60px;
}
.status-bar { height: 44px; background: #fff; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; font-size: 12px; font-weight: 600; }

/* Nav Bar */
.nav-bar {
  height: 44px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; border-bottom: 1px solid #f0f0f0;
}
.nav-back { font-size: 20px; color: #333; }
.nav-title { font-size: 17px; font-weight: 600; }
.nav-action { font-size: 14px; color: #FF6B35; font-weight: 500; }

/* Type Tabs */
.type-tabs {
  display: flex; padding: 16px; gap: 10px;
}
.type-tab {
  flex: 1; padding: 10px; border-radius: 12px; text-align: center;
  font-size: 14px; font-weight: 500; border: 2px solid #eee;
}
.type-tab.active { border-color: #FF6B35; color: #FF6B35; background: #FFF3ED; }
.type-tab .tab-emoji { font-size: 24px; display: block; margin-bottom: 4px; }

/* Form */
.form-section { padding: 0 16px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 13px; color: #999; margin-bottom: 8px; display: block; }
.form-input {
  width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px;
  font-size: 14px; outline: none; color: #333;
}
.form-input:focus { border-color: #FF6B35; }
.form-textarea {
  width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px;
  font-size: 14px; outline: none; height: 80px; resize: none;
  font-family: inherit; color: #333;
}

/* Photo Upload */
.photo-upload {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.photo-slot {
  width: 80px; height: 80px; border: 2px dashed #ddd; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 11px; color: #bbb; gap: 2px;
}
.photo-slot .plus { font-size: 24px; color: #ccc; }
.photo-slot.filled {
  border: none; background: #f5f5f5;
  font-size: 30px; color: #999;
}
.photo-slot .photo-count { font-size: 10px; color: #999; }

/* Price Row */
.price-row {
  display: flex; gap: 10px;
}
.price-row .form-group { flex: 1; }
.price-input-wrap {
  display: flex; align-items: center; border: 1px solid #eee; border-radius: 10px; overflow: hidden;
}
.price-prefix {
  padding: 12px; background: #f9f9f9; font-size: 16px; color: #FF6B35; font-weight: 600;
  border-right: 1px solid #eee;
}
.price-input-wrap input {
  flex: 1; border: none; padding: 12px; font-size: 14px; outline: none;
}

/* Category Select */
.category-select {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.cat-option {
  padding: 6px 14px; border-radius: 20px; border: 1px solid #eee;
  font-size: 13px; color: #666;
}
.cat-option.active { background: #FF6B35; color: #fff; border-color: #FF6B35; }

/* Submit Button */
.submit-btn {
  margin: 20px 16px;
  padding: 14px;
  background: linear-gradient(135deg, #FF6B35, #FF8C42);
  color: #fff; font-size: 16px; font-weight: 600;
  border: none; border-radius: 12px; width: calc(100% - 32px);
  text-align: center;
  box-shadow: 0 4px 12px rgba(255,107,53,0.3);
}
</style>
</head>
<body>

<div class="page-label">② 发布页 — 发布商品 / 拼团</div>

<div class="phone-frame">
  <div class="status-bar">
    <span>18:00</span>
    <span>📶 🔋</span>
  </div>

  <div class="nav-bar">
    <span class="nav-back">‹</span>
    <span class="nav-title">发布</span>
    <span class="nav-action">草稿箱</span>
  </div>

  <!-- Type Selection -->
  <div class="type-tabs">
    <div class="type-tab active">
      <span class="tab-emoji">📦</span>
      二手好物
    </div>
    <div class="type-tab">
      <span class="tab-emoji">🎯</span>
      拼团服务
    </div>
  </div>

  <div class="form-section">
    <!-- Photos -->
    <div class="form-group">
      <label class="form-label">商品图片（最多9张）</label>
      <div class="photo-upload">
        <div class="photo-slot filled">📷</div>
        <div class="photo-slot filled">📷</div>
        <div class="photo-slot">
          <span class="plus">+</span>
          <span>添加</span>
        </div>
      </div>
    </div>

    <!-- Title -->
    <div class="form-group">
      <label class="form-label">商品名称</label>
      <input class="form-input" placeholder="描述一下你的宝贝" value="好孩子婴儿推车 九成新">
    </div>

    <!-- Description -->
    <div class="form-group">
      <label class="form-label">详细描述</label>
      <textarea class="form-textarea" placeholder="品牌、尺寸、使用时长、新旧程度...">轻便型推车，宝宝用了半年，功能完好。可折叠，出门很方便。自提或小区内面交。</textarea>
    </div>

    <!-- Category -->
    <div class="form-group">
      <label class="form-label">分类</label>
      <div class="category-select">
        <div class="cat-option active">母婴</div>
        <div class="cat-option">玩具</div>
        <div class="cat-option">书籍</div>
        <div class="cat-option">家居</div>
        <div class="cat-option">服饰</div>
        <div class="cat-option">数码</div>
        <div class="cat-option">其他</div>
      </div>
    </div>

    <!-- Price & Original -->
    <div class="price-row">
      <div class="form-group">
        <label class="form-label">售价</label>
        <div class="price-input-wrap">
          <span class="price-prefix">¥</span>
          <input type="number" placeholder="0" value="280">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">原价（选填）</label>
        <div class="price-input-wrap">
          <span class="price-prefix">¥</span>
          <input type="number" placeholder="0" value="899">
        </div>
      </div>
    </div>

    <!-- Location -->
    <div class="form-group">
      <label class="form-label">交易地点</label>
      <input class="form-input" placeholder="选择交易地点" value="📍 幸福花园小区 南门">
    </div>
  </div>

  <div class="submit-btn">立即发布</div>
</div>

</body>
</html>
