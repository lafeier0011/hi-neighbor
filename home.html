<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邻趣集市 - UI设计稿</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: #f0f0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
.subtitle { color: #999; margin-bottom: 30px; font-size: 14px; }

.phone-frame {
  width: 375px;
  height: 812px;
  background: #fff;
  border-radius: 40px;
  border: 8px solid #1a1a1a;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  margin-bottom: 60px;
}

/* Status Bar */
.status-bar {
  height: 44px;
  background: #fff;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  font-size: 12px;
  font-weight: 600;
}
.status-bar .time { font-size: 14px; }
.status-bar .icons { display: flex; gap: 4px; align-items: center; }

/* Home Page */
.home-header {
  background: linear-gradient(135deg, #FF6B35, #FF8C42);
  padding: 12px 16px 16px;
}
.home-header .greeting { color: rgba(255,255,255,0.9); font-size: 13px; margin-bottom: 8px; }
.home-header .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.home-header .app-name { color: #fff; font-size: 22px; font-weight: 700; }
.home-header .location { color: rgba(255,255,255,0.8); font-size: 12px; display: flex; align-items: center; gap: 4px; }
.search-bar {
  background: rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 8px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(255,255,255,0.7);
  font-size: 14px;
}
.search-bar .icon { font-size: 16px; }

/* Categories */
.categories {
  display: flex;
  padding: 14px 16px;
  gap: 8px;
  overflow-x: auto;
  border-bottom: 1px solid #f5f5f5;
}
.cat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 56px;
  gap: 4px;
}
.cat-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.cat-name { font-size: 11px; color: #666; }

/* Product Grid */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px 8px;
}
.section-title { font-size: 16px; font-weight: 600; color: #333; }
.section-more { font-size: 12px; color: #999; }

.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 16px;
}
.product-card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.product-img {
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: #ccc;
}
.product-info { padding: 10px; }
.product-name { font-size: 13px; color: #333; font-weight: 500; line-height: 1.3; margin-bottom: 6px;
  overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.product-meta { display: flex; justify-content: space-between; align-items: center; }
.product-price { color: #FF6B35; font-size: 16px; font-weight: 700; }
.product-price span { font-size: 11px; }
.product-tag {
  background: #FFF3ED;
  color: #FF6B35;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
}

/* Tab Bar */
.tab-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 80px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  align-items: flex-start;
  padding-top: 8px;
  justify-content: space-around;
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.tab-icon { font-size: 24px; }
.tab-label { font-size: 10px; color: #999; }
.tab-item.active .tab-icon { color: #FF6B35; }
.tab-item.active .tab-label { color: #FF6B35; font-weight: 600; }
.tab-publish {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, #FF6B35, #FF8C42);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 28px; font-weight: 300;
  margin-top: -20px;
  box-shadow: 0 4px 12px rgba(255,107,53,0.4);
}

/* Page label */
.page-label {
  text-align: center;
  margin-bottom: 16px;
  font-size: 18px;
  font-weight: 600;
  color: #333;
}
.page-desc {
  text-align: center;
  color: #999;
  font-size: 12px;
  margin-bottom: 24px;
}
</style>
</head>
<body>

<div class="page-label">📱 邻趣集市 Hi-Neighbor — UI 设计稿</div>
<div class="page-desc">MVP版本 · 社区二手交易+拼团小程序</div>
