<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邻趣集市 — 商品详情</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #f8f5f1;
  --border: #ebe4da;
  --text: #2d2a26;
  --text-secondary: #6b6b6b;
  --text-tertiary: #999;
  --accent: #c2703e;
  --accent-light: #fdf5ee;
  --success: #3a7d5c;
  --radius: 8px;
  --radius-sm: 6px;
  --font: 'Outfit', -apple-system, 'PingFang SC', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font); background: var(--surface);
  display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
  color: var(--text);
}
.page-label { font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.page-title { font-size: 20px; font-weight: 700; margin-bottom: 32px; }
.phone-frame {
  width: 375px; height: 812px; background: var(--bg);
  border-radius: 44px; border: 8px solid #2d2a26;
  overflow: hidden; position: relative;
  box-shadow: 0 24px 48px -12px rgba(0,0,0,0.12); margin-bottom: 80px;
}
.status-bar {
  height: 48px; display: flex; justify-content: space-between; align-items: center;
  padding: 0 24px; font-size: 13px; font-weight: 600; color: var(--text);
}
.status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 11px; }

/* Nav */
.nav-bar {
  height: 48px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; border-bottom: 1px solid var(--border);
}
.nav-back { font-size: 18px; color: var(--text); cursor: pointer; font-weight: 300; }
.nav-title { font-size: 16px; font-weight: 600; }
.nav-share { font-size: 13px; color: var(--text-tertiary); }

/* Image Area */
.detail-img {
  height: 280px; background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.img-placeholder {
  width: 64px; height: 64px; border-radius: var(--radius);
  background: var(--border);
}
.img-counter {
  position: absolute; bottom: 12px; right: 16px;
  background: rgba(0,0,0,0.5); color: #fff;
  font-size: 11px; padding: 3px 8px; border-radius: 10px;
}

/* Content */
.detail-content { padding: 20px; }

.detail-price-row {
  display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px;
}
.detail-price {
  font-size: 28px; font-weight: 700; color: var(--accent);
}
.detail-price .unit { font-size: 16px; }
.detail-original {
  font-size: 14px; color: var(--text-tertiary);
  text-decoration: line-through;
}

.detail-title {
  font-size: 17px; font-weight: 600; line-height: 1.5;
  margin-bottom: 12px;
}

.detail-meta {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
}
.meta-tag {
  font-size: 11px; padding: 3px 10px; border-radius: 3px;
  font-weight: 500; background: var(--surface); color: var(--text-secondary);
}
.meta-tag.condition { background: var(--accent-light); color: var(--accent); font-weight: 600; }

/* Divider */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Description */
.section-label {
  font-size: 12px; font-weight: 600; color: var(--text-tertiary);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
}
.detail-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.7;
}

/* Seller */
.seller-card {
  margin: 16px 20px; padding: 16px; background: var(--surface);
  border-radius: var(--radius); border: 1px solid var(--border);
}
.seller-top {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.seller-avatar {
  width: 40px; height: 40px; border-radius: 50%; background: var(--border);
}
.seller-name { font-size: 15px; font-weight: 600; }
.seller-loc { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

.seller-contact {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: var(--bg);
  border-radius: var(--radius-sm); border: 1px solid var(--border);
}
.contact-info {
  display: flex; align-items: center; gap: 8px;
}
.contact-type {
  font-size: 10px; font-weight: 600; color: var(--accent);
  background: var(--accent-light); padding: 2px 6px; border-radius: 3px;
}
.contact-value { font-size: 14px; color: var(--text); font-weight: 500; }
.copy-btn {
  padding: 6px 14px; background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 600; border: none; border-radius: var(--radius-sm);
  font-family: var(--font); cursor: pointer;
}

/* Location */
.location-row {
  display: flex; align-items: center; gap: 8px;
  padding: 0 20px; margin-top: 16px;
}
.location-pin {
  width: 16px; height: 16px; border: 2px solid var(--accent);
  border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
  position: relative;
}
.location-pin::after {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
}
.location-text { font-size: 13px; color: var(--text-secondary); }

/* Bottom Bar */
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 80px; background: var(--bg); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
}
.fav-btn {
  width: 44px; height: 44px; border: 1px solid var(--border);
  border-radius: var(--radius); display: flex; align-items: center;
  justify-content: center; background: var(--bg); flex-shrink: 0;
}
.fav-btn svg { width: 20px; height: 20px; stroke: var(--text-tertiary); stroke-width: 1.5; fill: none; }
.contact-btn {
  flex: 1; height: 44px; background: var(--accent); color: #fff;
  font-size: 15px; font-weight: 600; border: none; border-radius: var(--radius);
  font-family: var(--font);
}
</style>
</head>
<body>

<div class="page-label">06 / 06</div>
<div class="page-title">商品详情</div>

<div class="phone-frame">
  <div class="status-bar">
    <span>9:41</span>
    <span class="icons">●●● Wi-Fi ■</span>
  </div>

  <div class="nav-bar">
    <span class="nav-back">←</span>
    <span class="nav-title">商品详情</span>
    <span class="nav-share">分享</span>
  </div>

  <div class="detail-img">
    <div class="img-placeholder"></div>
    <div class="img-counter">1/3</div>
  </div>

  <div class="detail-content">
    <div class="detail-price-row">
      <div class="detail-price"><span class="unit">¥</span>280</div>
      <div class="detail-original">¥899</div>
    </div>
    <div class="detail-title">好孩子婴儿推车 九成新 轻便可折叠</div>
    <div class="detail-meta">
      <div class="meta-tag condition">9成新</div>
      <div class="meta-tag">母婴</div>
      <div class="meta-tag">幸福花园</div>
    </div>
  </div>

  <div style="padding:0 20px;">
    <div class="divider"></div>
    <div class="section-label">描述</div>
    <div class="detail-desc">
      好孩子轻便型推车，宝宝用了半年，功能完好。可折叠，出门很方便。车架无磕碰，布料干净无污渍。自提或小区内面交，可现场验货。
    </div>
  </div>

  <!-- Seller -->
  <div class="seller-card">
    <div class="seller-top">
      <div class="seller-avatar"></div>
      <div>
        <div class="seller-name">王女士</div>
        <div class="seller-loc">幸福花园 · 3号楼</div>
      </div>
    </div>
    <div class="seller-contact">
      <div class="contact-info">
        <span class="contact-type">微信</span>
        <span class="contact-value">wang_baby2024</span>
      </div>
      <button class="copy-btn" onclick="copyContact(this, 'wang_baby2024')">复制</button>
    </div>
    <div class="seller-contact" style="margin-top:8px;">
      <div class="contact-info">
        <span class="contact-type" style="background:#e8f0f8;color:#2c5f8a;">手机</span>
        <span class="contact-value">138****6789</span>
      </div>
      <button class="copy-btn" onclick="copyContact(this, '13800106789')">复制</button>
    </div>
  </div>

  <div class="location-row">
    <div class="location-pin"></div>
    <div class="location-text">交易地点：幸福花园小区 · 南门</div>
  </div>

  <!-- Bottom -->
  <div class="bottom-bar">
    <div class="fav-btn">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </div>
    <button class="contact-btn">联系卖家</button>
  </div>
</div>

<script>
function copyContact(btn, value) {
  navigator.clipboard.writeText(value).then(() => {
    btn.textContent = '已复制';
    setTimeout(() => { btn.textContent = '复制'; }, 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = value;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '已复制';
    setTimeout(() => { btn.textContent = '复制'; }, 1500);
  });
}
</script>

</body>
</html>
