<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邻趣集市 — 拼团页</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #f8f5f1;
  --border: #ebe4da;
  --text: #2d2a26;
  --text-secondary: #6b6b6b;
  --text-tertiary: #999;
  --accent: #a85c32;
  --accent-light: #fdf5ee;
  --success: #3a7d5c;
  --radius: 8px;
  --radius-sm: 6px;
  --font: 'Outfit', -apple-system, 'PingFang SC', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font); background: var(--surface);
  display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
  color: #c2703e;
}
.page-label { font-size: 13px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.page-title { font-size: 20px; font-weight: 700; margin-bottom: 32px; }
.phone-frame {
  width: 375px; height: 812px; background: var(--bg);
  border-radius: 44px; border: 8px solid #2d2a26;
  overflow: hidden; position: relative;
  box-shadow: 0 24px 48px -12px rgba(0,0,0,0.12); margin-bottom: 80px;
}
.status-bar {
  height: 48px; display: flex; justify-content: space-between; align-items: center;
  padding: 0 24px; font-size: 13px; font-weight: 600; color: #c2703e;
}
.status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 11px; }

.nav-bar {
  height: 48px; display: flex; align-items: center; justify-content: center;
  padding: 0 20px; border-bottom: 1px solid var(--border); position: relative;
}
.nav-back { position: absolute; left: 20px; font-size: 18px; color: var(--text); }
.nav-title { font-size: 16px; font-weight: 600; }

/* Filters */
.filter-tabs { display: flex; padding: 14px 20px; gap: 8px; }
.filter-tab {
  padding: 6px 16px; border-radius: 20px; font-size: 13px;
  background: var(--surface); color: var(--text-secondary); font-weight: 500;
}
.filter-tab.active { background: #c2703e; color: var(--bg); }

/* Card */
.group-card {
  margin: 0 20px 12px; padding: 16px; background: var(--bg);
  border-radius: var(--radius); border: 1px solid var(--border);
}
.group-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 8px;
}
.group-title {
  font-size: 15px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.4;
}
.group-badge {
  font-size: 10px; padding: 3px 8px; border-radius: 4px;
  white-space: nowrap; margin-left: 10px; font-weight: 600;
  letter-spacing: 0.3px;
}
.group-badge.active { background: var(--accent-light); color: var(--accent); }
.group-badge.done { background: #e8f5ee; color: var(--success); }
.group-desc {
  font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.5;
}
.group-info {
  display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;
}
.group-price { font-size: 20px; font-weight: 700; color: #c2703e; }
.group-price .unit { font-size: 13px; font-weight: 500; }
.group-price .original {
  font-size: 12px; color: var(--text-tertiary);
  text-decoration: line-through; margin-left: 6px; font-weight: 400;
}
.group-status { font-size: 12px; color: var(--text-tertiary); }

/* Progress */
.progress-wrap { margin-bottom: 14px; }
.progress-label {
  display: flex; justify-content: space-between; font-size: 11px;
  color: var(--text-tertiary); margin-bottom: 6px;
}
.progress-bar { height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #c2703e; border-radius: 2px; }

/* Avatars */
.group-avatars { display: flex; align-items: center; margin-bottom: 14px; }
.avatar {
  width: 24px; height: 24px; border-radius: 50%; background: var(--border);
  margin-right: -4px; border: 2px solid var(--bg);
}
.avatar.empty {
  background: var(--surface); border: 1px dashed var(--border);
}
.remaining { font-size: 11px; color: var(--text-tertiary); margin-left: 10px; }

/* Join */
.join-btn {
  width: 100%; padding: 11px; background: #c2703e; color: var(--bg);
  font-size: 14px; font-weight: 600; border: none; border-radius: var(--radius);
  text-align: center; font-family: var(--font);
}
.join-btn.disabled {
  background: var(--surface); color: var(--text-tertiary);
}
.countdown {
  text-align: center; font-size: 11px; color: var(--text-tertiary); margin-top: 8px;
}

/* Tab bar */
.tab-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 82px; background: var(--bg); border-top: 1px solid var(--border);
  display: flex; align-items: flex-start; padding-top: 10px; justify-content: space-around;
}
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.tab-icon-wrap { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.tab-icon-wrap svg { width: 22px; height: 22px; stroke: var(--text-tertiary); stroke-width: 1.5; fill: none; }
.tab-label { font-size: 10px; color: var(--text-tertiary); font-weight: 500; }
.tab-item.active .tab-icon-wrap svg { stroke: #c2703e; }
.tab-item.active .tab-label { color: #c2703e; font-weight: 600; }
.tab-publish-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.tab-publish {
  width: 44px; height: 44px; background: #c2703e; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center; margin-top: -8px;
}
.tab-publish svg { width: 20px; height: 20px; stroke: var(--bg); stroke-width: 2; fill: none; }
</style>
</head>
<body>

<div class="page-label">03 / 05</div>
<div class="page-title">拼团</div>

<div class="phone-frame">
  <div class="status-bar">
    <span>9:41</span>
    <span class="icons">●●● Wi-Fi ■</span>
  </div>

  <div class="nav-bar">
    <span class="nav-back">←</span>
    <span class="nav-title">社区拼团</span>
  </div>

  <div class="filter-tabs">
    <div class="filter-tab active">全部</div>
    <div class="filter-tab">进行中</div>
    <div class="filter-tab">即将成团</div>
    <div class="filter-tab">已完成</div>

  <!-- Card 1 -->
  <div class="group-card">
    <div class="group-header">

    <div class="group-info">

    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>15 / 20 人</span>
        <span>75%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 75%;"></div>
      </div>
    </div>
    <div class="group-avatars">
      <div class="avatar"></div>
      <div class="avatar"></div>
      <div class="avatar"></div>
      <div class="avatar"></div>
      <div class="avatar"></div>
      <div class="avatar empty"></div>
      <div class="remaining">等更多邻居加入</div>
    </div>
    <div class="join-btn">参团</div>
    <div class="countdown">剩余 2天12小时</div>
  </div>

  <!-- Card 2 -->
  <div class="group-card">
    <div class="group-header">

    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>12 / 10 人</span>
        <span>100%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 100%;"></div>
      </div>
    </div>
    <div class="group-avatars">
      <div class="avatar"></div>
      <div class="avatar"></div>
      <div class="avatar"></div>
      <div class="avatar"></div>
      <div class="avatar"></div>
    </div>
    <div class="join-btn disabled">已结束</div>
  </div>

  <div class="tab-bar">
    <div class="tab-item">
      <div class="tab-icon-wrap"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div class="tab-label">首页</div>
    </div>
    <div class="tab-item active">
      <div class="tab-icon-wrap"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
      <div class="tab-label">拼团</div>
    </div>
    <div class="tab-publish-wrap">
      <div class="tab-publish"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
      <div class="tab-label" style="color:var(--text-tertiary);">发布</div>
    </div>
    <div class="tab-item">
      <div class="tab-icon-wrap"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <div class="tab-label">公告</div>
    </div>
    <div class="tab-item">
      <div class="tab-icon-wrap"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
      <div class="tab-label">我的</div>
    </div>
  </div>
</div>

</body>
</html>
