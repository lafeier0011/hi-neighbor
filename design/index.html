<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邻趣集市 — 首页</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --surface: #f8f5f1;
  --border: #ebe4da;
  --text: #2d2a26;
  --text-secondary: #6b6b6b;
  --text-tertiary: #999;
  --accent: #a85c32;
  --accent-light: #fdf5ee;
  --success: #3a7d5c;
  --radius: 8px;
  --radius-sm: 6px;
  --font: 'Outfit', -apple-system, 'PingFang SC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
  color: #c2703e;
}

.page-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.page-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 32px;
  color: #c2703e;
}

.phone-frame {
  width: 375px;
  height: 812px;
  background: var(--bg);
  border-radius: 44px;
  border: 8px solid #2d2a26;
  overflow: hidden;
  position: relative;
  box-shadow: 0 24px 48px -12px rgba(0,0,0,0.12);
  margin-bottom: 80px;
}

/* Status Bar */
.status-bar {
  height: 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  font-size: 13px;
  font-weight: 600;
  color: #c2703e;
}
.status-bar .icons { display: flex; gap: 6px; align-items: center; font-size: 11px; }

/* Top Section */
.top-section {
  padding: 4px 20px 16px;
}
.top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.app-name {
  font-size: 20px;
  font-weight: 700;
  color: #c2703e;
  letter-spacing: -0.3px;
}
.location {
  font-size: 12px;
  color: var(--text-tertiary);
  display: flex;
  align-items: center;
  gap: 4px;
}
.location-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
}

/* Search */
.search-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text-tertiary);
  font-size: 14px;
  border: 1px solid transparent;
}
.search-icon {
  width: 16px;
  height: 16px;
  border: 2px solid var(--text-tertiary);
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
}
.search-icon::after {
  content: '';
  position: absolute;
  width: 6px;
  height: 2px;
  background: var(--text-tertiary);
  bottom: -3px;
  right: -4px;
  transform: rotate(45deg);
  border-radius: 1px;
}

/* Categories */
.categories {
  display: flex;
  padding: 16px 20px 12px;
  gap: 20px;
  overflow-x: auto;
  border-bottom: 1px solid var(--border);
}
.cat-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-width: 48px;
}
.cat-dot {
  width: 40px;
  height: 40px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}
.cat-name {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
}

/* Section Header */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px 10px;
}
.section-title {
  font-size: 15px;
  font-weight: 600;
  color: #c2703e;
}
.section-more {
  font-size: 12px;
  color: var(--text-tertiary);
}

/* Product Grid */
.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 20px;
  padding-bottom: 100px;
}
.product-card {
  background: var(--bg);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
}
.product-img {
  height: 130px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
}
.product-img-placeholder {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  background: var(--border);
}
.product-info {
  padding: 10px 12px;
}
.product-name {
  font-size: 13px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.4;
  margin-bottom: 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.product-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.product-price {
  color: #c2703e;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.product-price .unit {
  font-size: 12px;
  font-weight: 500;
}
.product-tag {
  font-size: 10px;
  color: var(--text-tertiary);
  font-weight: 500;
}
.product-condition {
  font-size: 10px;
  color: var(--accent);
  font-weight: 600;
  background: var(--accent-light);
  padding: 2px 6px;
  border-radius: 3px;
}

/* Tab Bar */
.tab-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 82px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding-top: 10px;
  justify-content: space-around;
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.tab-icon-wrap {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.tab-icon-wrap svg {
  width: 22px;
  height: 22px;
  stroke: var(--text-tertiary);
  stroke-width: 1.5;
  fill: none;
}
.tab-label {
  font-size: 10px;
  color: var(--text-tertiary);
  font-weight: 500;
}
.tab-item.active .tab-icon-wrap svg { stroke: #c2703e; }
.tab-item.active .tab-label { color: #c2703e; font-weight: 600; }

/* Publish button */
.tab-publish-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.tab-publish {
  width: 44px;
  height: 44px;
  background: #c2703e;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: -8px;
}
.tab-publish svg {
  width: 20px;
  height: 20px;
  stroke: var(--bg);
  stroke-width: 2;
  fill: none;
}
</style>
</head>
<body>

</html>
